kind = "web"
previewPath = "/"
title = "Freelancer Weekly Planner"
version = "1.0.0"
id = "artifacts/freelancer-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22106

[services.development]
run = "pnpm --filter @workspace/freelancer-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/freelancer-planner", "run", "build" ]
publicDir = "artifacts/freelancer-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22106"
BASE_PATH = "/"
